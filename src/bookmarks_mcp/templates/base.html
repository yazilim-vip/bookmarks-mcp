<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>bookmarks-mcp</title>
    <style>
      * { box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
             margin: 0; color: #1c1c1e; background: #f7f7fb; }
      header { background: #1c1c1e; color: #fff; padding: 12px 24px;
               display: flex; align-items: center; gap: 16px; }
      header h1 { margin: 0; font-size: 16px; font-weight: 600; }
      header form { margin-left: auto; }
      header input[type=search] { padding: 6px 10px; border-radius: 6px;
        border: 1px solid #444; background: #2c2c2e; color: #fff; min-width: 280px; }
      .layout { display: grid; grid-template-columns: 280px 1fr;
        min-height: calc(100vh - 49px); }
      aside { background: #fff; border-right: 1px solid #e5e5ea; padding: 16px; overflow: auto; }
      main { padding: 24px; overflow: auto; }
      h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em;
        color: #6b6b70; margin: 16px 0 8px; }
      h2:first-child { margin-top: 0; }
      ul.tree { list-style: none; padding: 0; margin: 0; }
      ul.tree li { padding: 2px 0; }
      ul.tree ul { list-style: none; padding-left: 14px; margin: 0;
        border-left: 1px dashed #ddd; }
      a { color: #007aff; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .row { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
      .row a { flex: 1; }
      .row .ops { font-size: 11px; color: #8e8e93; }
      .row.selected > a { font-weight: 700; color: #1c1c1e; }
      .pill { display: inline-block; padding: 2px 8px; background: #eef;
        border-radius: 999px; font-size: 12px; margin-right: 4px; color: #2a2a72; }
      .bookmark { padding: 12px 16px; background: #fff; border: 1px solid #e5e5ea;
        border-radius: 8px; margin-bottom: 8px; }
      .bookmark .url { color: #6b6b70; font-size: 12px; word-break: break-all; }
      .bookmark .desc { margin-top: 6px; color: #3a3a3c; font-size: 13px; }
      .bookmark .meta { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px;
        align-items: center; }
      .actions form { display: inline-block; margin: 0 6px 6px 0; }
      .actions input[type=text], .actions select {
        padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
      .actions button { padding: 4px 10px; border: 1px solid #ddd; background: #fafafa;
        border-radius: 4px; font-size: 12px; cursor: pointer; }
      .actions button.danger { color: #ff3b30; border-color: #ffaba6; background: #fff5f5; }
      .empty { color: #8e8e93; font-size: 14px; padding: 32px; text-align: center;
        border: 1px dashed #d8d8e0; border-radius: 8px; background: #fff; }
      details > summary { cursor: pointer; font-size: 12px; color: #007aff; padding: 6px 0; }
      .dim { color: #8e8e93; }
    </style>
</head>
<body>
    <header>
        <h1>📚 bookmarks-mcp</h1>
        <form method="get" action="/">
          {% if selected_folder %}<input type="hidden" name="folder" value="{{ selected_folder.id }}">{% endif %}
          {% if selected_tag %}<input type="hidden" name="tag" value="{{ selected_tag }}">{% endif %}
          <input type="search" name="q" value="{{ query or '' }}" placeholder="Search title, URL, description…">
        </form>
    </header>
    <div class="layout">
      <aside>{% block sidebar %}{% endblock %}</aside>
      <main>{% block main %}{% endblock %}</main>
    </div>
</body>
</html>
